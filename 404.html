<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirection...</title>
  <script>
    // Récupère le chemin et les paramètres
    var path = window.location.pathname;
    var query = window.location.search;
    var hash = window.location.hash;

    // Construit la nouvelle URL : base + paramètres
    var newUrl = "/hanout/" + "?" + path.slice(1) + query + hash;

    // Redirige vers index.html avec les paramètres
    window.location.replace(newUrl);
  </script>
</head>
<body>
  <p>Redirection en cours...</p>
</body>
</html>
